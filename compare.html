<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SQL Eval Compare Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: #0f172a;
      background: #f8fafc;
      line-height: 1.45;
    }
    body {
      margin: 0;
      padding: 1rem;
    }
    h1 {
      margin: 0 0 0.8rem 0;
      font-size: 1.5rem;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      gap: 0.9rem;
    }
    .panel, .detail {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(2, 6, 23, 0.04);
    }
    .panel {
      padding: 0.9rem;
    }
    .detail {
      padding: 1rem;
      min-height: 70vh;
    }
    .row {
      margin-bottom: 0.8rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.2rem;
      font-size: 0.9rem;
    }
    input, select, button {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 0.45rem 0.55rem;
      font: inherit;
      background: #fff;
    }
    button {
      cursor: pointer;
      background: #2563eb;
      border: none;
      color: #fff;
      font-weight: 600;
    }
    button.secondary {
      background: #e2e8f0;
      color: #0f172a;
      margin-top: 0.35rem;
    }
    .list {
      max-height: 48vh;
      overflow: auto;
      border-top: 1px solid #e2e8f0;
      margin-top: 0.6rem;
      padding-top: 0.6rem;
    }
    .item {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.55rem;
      margin-bottom: 0.55rem;
      cursor: pointer;
      background: #f8fafc;
    }
    .item:hover {
      border-color: #93c5fd;
    }
    .item.active {
      border-color: #2563eb;
      background: #eff6ff;
    }
    .item h4 {
      margin: 0 0 0.25rem;
      font-size: 0.92rem;
    }
    .item p {
      margin: 0;
      font-size: 0.82rem;
      color: #334155;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.45rem;
      margin-bottom: 1rem;
    }
    .metric {
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      padding: 0.45rem 0.55rem;
      background: #f8fafc;
    }
    .metric .k {
      font-size: 0.75rem;
      color: #475569;
    }
    .metric .v {
      font-size: 0.94rem;
      font-weight: 700;
    }
    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }
    .card {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.55rem;
      background: #f8fafc;
    }
    .card h3 {
      margin: 0 0 0.4rem;
      font-size: 0.9rem;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.8rem;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 0.5rem;
      max-height: 260px;
      overflow: auto;
    }
    .badges {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin: 0.35rem 0 0.55rem;
    }
    .badge {
      font-size: 0.75rem;
      border-radius: 999px;
      padding: 0.18rem 0.52rem;
      border: 1px solid transparent;
      font-weight: 600;
    }
    .b-good { background: #dcfce7; color: #166534; border-color: #86efac; }
    .b-mid { background: #fef3c7; color: #92400e; border-color: #fde68a; }
    .b-bad { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
    .b-na { background: #e2e8f0; color: #334155; border-color: #cbd5e1; }
    .error {
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #9f1239;
      border-radius: 8px;
      padding: 0.55rem;
      margin-bottom: 0.7rem;
      font-size: 0.84rem;
    }
    .small {
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <h1>SQL Eval Compare Viewer</h1>
  <div class="layout">
    <div class="panel">
      <div class="row">
        <label for="json-url">JSON path (default)</label>
        <input id="json-url" value="results/eval_zero_shot.json" />
        <button id="load-url" class="secondary">Load From Path</button>
      </div>
      <div class="row">
        <label for="json-file">Or upload JSON</label>
        <input id="json-file" type="file" accept=".json,application/json" />
      </div>
      <div class="row">
        <label for="q-search">Search question</label>
        <input id="q-search" placeholder="type to filter question text" />
      </div>
      <div class="row">
        <label for="status-filter">Status filter</label>
        <select id="status-filter">
          <option value="all">All</option>
          <option value="error">Only errors</option>
          <option value="ok">Only exec-ok</option>
          <option value="exact">Only exact exec match</option>
        </select>
      </div>
      <div class="row">
        <label for="sort-by">Sort by</label>
        <select id="sort-by">
          <option value="index">Index</option>
          <option value="f1_desc">F1 desc</option>
          <option value="f1_asc">F1 asc</option>
          <option value="conf_desc">Confidence desc</option>
          <option value="conf_asc">Confidence asc</option>
          <option value="ast_desc">AST similarity desc</option>
          <option value="ast_asc">AST similarity asc</option>
        </select>
      </div>
      <div class="small" id="count-note">No file loaded</div>
      <div class="list" id="item-list"></div>
    </div>
    <div class="detail" id="detail">
      <div class="small">Load an eval JSON and click an entry.</div>
    </div>
  </div>

  <script>
    const state = {
      data: null,
      rows: [],
      filtered: [],
      selected: null,
    };

    const listEl = document.getElementById("item-list");
    const detailEl = document.getElementById("detail");
    const countNoteEl = document.getElementById("count-note");

    const qSearchEl = document.getElementById("q-search");
    const statusFilterEl = document.getElementById("status-filter");
    const sortByEl = document.getElementById("sort-by");
    const jsonFileEl = document.getElementById("json-file");
    const jsonUrlEl = document.getElementById("json-url");
    const loadUrlBtn = document.getElementById("load-url");

    const esc = (v) => (v == null ? "" : String(v))
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");

    const toNum = (x) => (typeof x === "number" && Number.isFinite(x) ? x : null);

    function badgeClass(v) {
      if (v == null) return "b-na";
      if (v >= 0.8) return "b-good";
      if (v >= 0.5) return "b-mid";
      return "b-bad";
    }

    function metricBadge(label, value, pct = false) {
      let txt = "NA";
      if (value != null && Number.isFinite(value)) {
        txt = pct ? `${(value * 100).toFixed(1)}%` : value.toFixed(4);
      }
      return `<span class="badge ${badgeClass(value)}">${esc(label)}: ${esc(txt)}</span>`;
    }

    function rowStatus(row) {
      if (row.error) return "error";
      if (row.exact_exec_match) return "exact";
      if (row.pred_exec_ok && row.gt_exec_ok) return "ok";
      return "other";
    }

    function renderSummary(summary = {}) {
      const keys = [
        "evaluated_items",
        "pred_with_sql",
        "exec_eval_ok",
        "exec_exact_match",
        "avg_sql_ast_similarity",
        "avg_f1",
        "avg_row_jaccard",
        "avg_pred_confidence",
      ];
      const blocks = keys.map((k) => {
        const v = summary[k];
        const val = typeof v === "number" ? v : (v ?? "NA");
        return `<div class="metric"><div class="k">${esc(k)}</div><div class="v">${esc(val)}</div></div>`;
      }).join("");
      return `<div class="summary">${blocks}</div>`;
    }

    function renderDetail(row) {
      if (!row) {
        detailEl.innerHTML = '<div class="small">Load an eval JSON and click an entry.</div>';
        return;
      }

      const badges = [
        metricBadge("AST", toNum(row.sql_ast_similarity), true),
        metricBadge("F1", toNum(row.f1), true),
        metricBadge("Jaccard", toNum(row.row_jaccard), true),
        metricBadge("Norm", toNum(row.normalization_factor), true),
        metricBadge("ColAlign", toNum(row.column_alignment_score), true),
        metricBadge("Confidence", toNum(row.pred_confidence), true),
      ].join("");

      const err = row.error ? `<div class="error"><strong>Error:</strong> ${esc(row.error)}</div>` : "";
      const summaryHtml = renderSummary(state.data?.summary || {});

      detailEl.innerHTML = `
        ${summaryHtml}
        <h2 style="margin:0 0 0.3rem 0; font-size:1.1rem;">${esc(row.item_id || "n/a")}</h2>
        <div class="small" style="margin-bottom:0.5rem;">${esc(row.question || "")}</div>
        <div class="badges">${badges}</div>
        ${err}
        <div class="grid2">
          <div class="card">
            <h3>Pred SQL</h3>
            <pre>${esc(row.pred_sql || "")}</pre>
          </div>
          <div class="card">
            <h3>GT SQL</h3>
            <pre>${esc(row.gt_sql || "")}</pre>
          </div>
          <div class="card">
            <h3>Execution / Match</h3>
            <pre>${esc(JSON.stringify({
              pred_exec_ok: row.pred_exec_ok,
              gt_exec_ok: row.gt_exec_ok,
              exact_exec_match: row.exact_exec_match,
              precision: row.precision,
              recall: row.recall,
              f1: row.f1,
              row_jaccard: row.row_jaccard,
              normalization_factor: row.normalization_factor,
              pred_row_count: row.pred_row_count,
              gt_row_count: row.gt_row_count,
              pred_col_count: row.pred_col_count,
              gt_col_count: row.gt_col_count,
              column_alignment_score: row.column_alignment_score
            }, null, 2))}</pre>
          </div>
          <div class="card">
            <h3>Text Metrics</h3>
            <pre>${esc(JSON.stringify({
              chrf: row.chrf,
              rouge_l_f1: row.rouge_l_f1,
              bertscore_f1: row.bertscore_f1
            }, null, 2))}</pre>
          </div>
        </div>
      `;
    }

    function applyFilters() {
      const q = qSearchEl.value.trim().toLowerCase();
      const s = statusFilterEl.value;
      const sortBy = sortByEl.value;

      let rows = [...state.rows];
      if (q) rows = rows.filter((r) => (r.question || "").toLowerCase().includes(q));
      if (s !== "all") {
        rows = rows.filter((r) => {
          const st = rowStatus(r);
          return st === s;
        });
      }

      if (sortBy === "f1_desc") rows.sort((a, b) => (toNum(b.f1) ?? -1) - (toNum(a.f1) ?? -1));
      if (sortBy === "f1_asc") rows.sort((a, b) => (toNum(a.f1) ?? 2) - (toNum(b.f1) ?? 2));
      if (sortBy === "conf_desc") rows.sort((a, b) => (toNum(b.pred_confidence) ?? -1) - (toNum(a.pred_confidence) ?? -1));
      if (sortBy === "conf_asc") rows.sort((a, b) => (toNum(a.pred_confidence) ?? 2) - (toNum(b.pred_confidence) ?? 2));
      if (sortBy === "ast_desc") rows.sort((a, b) => (toNum(b.sql_ast_similarity) ?? -1) - (toNum(a.sql_ast_similarity) ?? -1));
      if (sortBy === "ast_asc") rows.sort((a, b) => (toNum(a.sql_ast_similarity) ?? 2) - (toNum(b.sql_ast_similarity) ?? 2));

      state.filtered = rows;
      countNoteEl.textContent = `${rows.length} / ${state.rows.length} rows`;
      renderList();

      if (!rows.length) return renderDetail(null);
      if (!state.selected || !rows.includes(state.selected)) state.selected = rows[0];
      renderDetail(state.selected);
    }

    function renderList() {
      listEl.innerHTML = "";
      if (!state.filtered.length) {
        listEl.innerHTML = '<div class="small">No rows match current filters.</div>';
        return;
      }
      state.filtered.forEach((row) => {
        const active = row === state.selected ? " active" : "";
        const tag = rowStatus(row);
        const f1 = toNum(row.f1);
        const conf = toNum(row.pred_confidence);
        const el = document.createElement("div");
        el.className = `item${active}`;
        el.innerHTML = `
          <h4>${esc(row.item_id || "")}</h4>
          <p>${esc((row.question || "").slice(0, 90))}${(row.question || "").length > 90 ? "..." : ""}</p>
          <div class="badges" style="margin-top:0.35rem;">
            <span class="badge ${tag === "error" ? "b-bad" : tag === "exact" ? "b-good" : "b-mid"}">${esc(tag)}</span>
            ${metricBadge("F1", f1, true)}
            ${metricBadge("Conf", conf, true)}
          </div>
        `;
        el.onclick = () => {
          state.selected = row;
          renderList();
          renderDetail(row);
        };
        listEl.appendChild(el);
      });
    }

    function parseInputObject(obj) {
      // Expected eval format: { summary, per_item: [...] }
      if (obj && Array.isArray(obj.per_item)) {
        state.data = obj;
        state.rows = obj.per_item;
        state.selected = state.rows[0] || null;
        applyFilters();
        return;
      }
      throw new Error("Unsupported JSON format. Expected object with per_item array.");
    }

    async function loadFromPath(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`HTTP ${res.status} while loading ${path}`);
      const obj = await res.json();
      parseInputObject(obj);
    }

    async function bootstrap() {
      const fromQuery = new URLSearchParams(window.location.search).get("file");
      if (fromQuery) jsonUrlEl.value = fromQuery;
      try {
        await loadFromPath(jsonUrlEl.value.trim());
      } catch (e) {
        detailEl.innerHTML = `<div class="error">Failed to load default file: ${esc(e.message)}</div>`;
      }
    }

    loadUrlBtn.onclick = async () => {
      try {
        await loadFromPath(jsonUrlEl.value.trim());
      } catch (e) {
        detailEl.innerHTML = `<div class="error">Load failed: ${esc(e.message)}</div>`;
      }
    };

    jsonFileEl.onchange = async (ev) => {
      const f = ev.target.files?.[0];
      if (!f) return;
      try {
        const txt = await f.text();
        const obj = JSON.parse(txt);
        parseInputObject(obj);
      } catch (e) {
        detailEl.innerHTML = `<div class="error">Invalid file: ${esc(e.message)}</div>`;
      }
    };

    qSearchEl.oninput = applyFilters;
    statusFilterEl.onchange = applyFilters;
    sortByEl.onchange = applyFilters;

    bootstrap();
  </script>
</body>
</html>
