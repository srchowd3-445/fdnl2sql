<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eval Compare Matrix</title>
  <style>
    :root {
      --bg: #f4f7f1;
      --ink: #132a13;
      --muted: #4f6f52;
      --card: #fefefe;
      --line: #c7d7b5;
      --ok: #2d6a4f;
      --mid: #c88a04;
      --bad: #b42318;
      --na: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      color: var(--ink);
      background:
        radial-gradient(1200px 500px at -10% -15%, #d8f3dc 0%, transparent 60%),
        radial-gradient(900px 500px at 110% -10%, #ffe8d6 0%, transparent 55%),
        var(--bg);
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
    }
    h1 {
      margin: 0 0 .2rem;
      font-size: 1.55rem;
      letter-spacing: .01em;
    }
    .sub { color: var(--muted); font-size: .9rem; margin-bottom: .9rem; }
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: .9rem;
      align-items: start;
    }
    .panel, .main {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 7px 24px rgba(19, 42, 19, .08);
    }
    .panel { padding: .9rem; position: sticky; top: .8rem; max-height: calc(100vh - 1.6rem); overflow: auto; }
    .main { padding: .9rem; }
    .row { margin-bottom: .75rem; }
    label { display:block; font-size:.82rem; font-weight:700; margin-bottom:.22rem; color:#1f3d25; }
    textarea, input, select, button {
      width: 100%;
      border: 1px solid #b8ccb0;
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      padding: .48rem .58rem;
      font: inherit;
    }
    textarea { min-height: 120px; resize: vertical; font-family: ui-monospace, Menlo, monospace; font-size:.78rem; }
    button {
      cursor: pointer;
      background: linear-gradient(120deg, #2d6a4f, #40916c);
      color: #fff;
      border: none;
      font-weight: 700;
    }
    button.secondary {
      background: #ecf3e8;
      color: #1f3d25;
      border: 1px solid #b8ccb0;
      margin-top: .3rem;
    }
    .note { font-size: .8rem; color: var(--muted); }
    .chips { display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.45rem; }
    .chip {
      border:1px solid #b8ccb0;
      background:#f5fbf3;
      color:#1f3d25;
      border-radius:999px;
      padding:.15rem .48rem;
      font-size:.74rem;
    }
    .chip input { width:auto; margin-right:.3rem; }
    .section-title { margin:.3rem 0 .45rem; font-size:1.02rem; }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:10px; background:#fff; }
    table { border-collapse: collapse; width: 100%; min-width: 980px; }
    th, td { border-bottom: 1px solid #e4eddc; padding: .42rem .5rem; font-size: .8rem; text-align: left; }
    th { position: sticky; top: 0; background: #edf6ea; z-index: 1; }
    tbody tr:hover { background: #f6fbf4; }
    tbody tr.active { outline: 2px solid #74c69d; background: #eefaf3; }
    .metric-cell { border-radius: 8px; padding: .15rem .36rem; font-weight: 700; display:inline-block; min-width: 58px; text-align:center; }
    .ok { background:#dcfce7; color:#166534; border:1px solid #86efac; }
    .mid { background:#fef3c7; color:#92400e; border:1px solid #fcd34d; }
    .bad { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
    .na { background:#e5e7eb; color:#374151; border:1px solid #d1d5db; }
    .detail {
      margin-top: .8rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fcfefb;
      padding: .75rem;
    }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:.65rem; }
    .card { border:1px solid #dce8d2; border-radius:10px; background:#fff; padding:.55rem; }
    .card h4 { margin:.05rem 0 .35rem; font-size:.86rem; }
    .kvs { font-size:.78rem; color:#25462e; margin-bottom:.35rem; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 180px;
      overflow: auto;
      border: 1px solid #dce8d2;
      border-radius: 8px;
      padding: .45rem;
      background: #f8fcf7;
      font-size: .76rem;
      font-family: ui-monospace, Menlo, monospace;
    }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .panel { position: static; max-height: none; }
      table { min-width: 760px; }
    }
  </style>
</head>
<body>
  <h1>SQL Eval Matrix</h1>
  <div class="sub">Compare all models and prompt styles side-by-side with color-coded filters.</div>

  <div class="layout">
    <aside class="panel">
      <div class="row">
        <label for="paths">Eval JSON paths (one per line)</label>
        <textarea id="paths">results/eval_baselines_v2/20260226_062742/eval_gemma27b_zero_shot.json
results/eval_baselines_v2/20260226_062742/eval_gemma27b_few_shot.json
results/eval_baselines_v2/20260226_062742/eval_gemma27b_cot.json
results/eval_baselines_v2/20260226_062742/eval_qwen3_30b_a3b_zero_shot.json
results/eval_baselines_v2/20260226_062742/eval_qwen3_30b_a3b_few_shot.json
results/eval_baselines_v2/20260226_062742/eval_qwen3_30b_a3b_cot.json</textarea>
        <button id="load">Load All Files</button>
        <button id="clear" class="secondary">Clear Selected Runs</button>
      </div>

      <div class="row">
        <label for="search">Search item/question</label>
        <input id="search" placeholder="line_18 or melanoma..." />
      </div>

      <div class="row">
        <label for="status">Status filter</label>
        <select id="status">
          <option value="all">All</option>
          <option value="error">Any error</option>
          <option value="exact">Any exact exec match</option>
          <option value="exec_ok">All selected exec-ok</option>
        </select>
      </div>

      <div class="row">
        <label for="metric">Color metric</label>
        <select id="metric">
          <option value="f1">F1</option>
          <option value="sql_ast_similarity">AST similarity</option>
          <option value="pred_confidence">Confidence</option>
          <option value="exact_exec_match">Exact exec match</option>
        </select>
      </div>

      <div class="row">
        <label for="colorFilter">Color filter</label>
        <select id="colorFilter">
          <option value="all">All colors</option>
          <option value="ok">Green only</option>
          <option value="mid">Amber only</option>
          <option value="bad">Red only</option>
          <option value="na">NA only</option>
        </select>
      </div>

      <div class="row">
        <label>Run selector</label>
        <div id="runChips" class="chips"></div>
      </div>

      <div class="note" id="counts">No files loaded</div>
    </aside>

    <main class="main">
      <h2 class="section-title">Run Summary</h2>
      <div class="table-wrap" id="summaryWrap"></div>

      <h2 class="section-title" style="margin-top:.85rem;">Per-Item Comparison</h2>
      <div class="table-wrap" id="itemsWrap"></div>

      <div class="detail" id="detail">
        Click a row to inspect SQL and metrics per run.
      </div>
    </main>
  </div>

  <script>
    const state = {
      runs: [],
      selectedRunIds: new Set(),
      items: [],
      filteredItems: [],
      activeItemId: null,
    };

    const el = {
      paths: document.getElementById('paths'),
      load: document.getElementById('load'),
      clear: document.getElementById('clear'),
      search: document.getElementById('search'),
      status: document.getElementById('status'),
      metric: document.getElementById('metric'),
      colorFilter: document.getElementById('colorFilter'),
      runChips: document.getElementById('runChips'),
      counts: document.getElementById('counts'),
      summaryWrap: document.getElementById('summaryWrap'),
      itemsWrap: document.getElementById('itemsWrap'),
      detail: document.getElementById('detail'),
    };

    const esc = (v) => (v == null ? '' : String(v))
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const toNum = (x) => (typeof x === 'number' && Number.isFinite(x) ? x : null);

    function parseRunId(path) {
      const name = path.split('/').pop() || path;
      const m = name.match(/^eval_(.+)_(zero_shot|few_shot|cot)\.json$/);
      if (!m) return { model: 'unknown', prompt: 'unknown', id: name.replace(/\.json$/,'') };
      const model = m[1];
      const prompt = m[2];
      return { model, prompt, id: `${model}:${prompt}` };
    }

    function bandFor(value, metricName) {
      if (metricName === 'exact_exec_match') {
        if (value === true || value === 1) return 'ok';
        if (value === false || value === 0) return 'bad';
        return 'na';
      }
      const n = toNum(value);
      if (n == null) return 'na';
      if (n >= 0.8) return 'ok';
      if (n >= 0.5) return 'mid';
      return 'bad';
    }

    function metricText(v, metricName) {
      if (metricName === 'exact_exec_match') return v ? '1' : '0';
      const n = toNum(v);
      return n == null ? 'NA' : n.toFixed(3);
    }

    async function loadRun(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${path}`);
      const obj = await res.json();
      if (!obj || !Array.isArray(obj.per_item)) throw new Error(`Invalid eval JSON: ${path}`);

      const p = parseRunId(path);
      const itemsMap = new Map();
      obj.per_item.forEach((r) => itemsMap.set(String(r.item_id), r));

      return {
        path,
        id: p.id,
        model: p.model,
        prompt: p.prompt,
        summary: obj.summary || {},
        perItem: obj.per_item,
        itemsMap,
      };
    }

    function buildItemUnion() {
      const byId = new Map();
      state.runs.forEach((run) => {
        run.perItem.forEach((r) => {
          const id = String(r.item_id);
          if (!byId.has(id)) {
            byId.set(id, {
              item_id: id,
              question: r.question || '',
              byRun: new Map(),
            });
          }
          const row = byId.get(id);
          if (!row.question && r.question) row.question = r.question;
          row.byRun.set(run.id, r);
        });
      });
      state.items = Array.from(byId.values()).sort((a, b) => a.item_id.localeCompare(b.item_id));
    }

    function selectedRuns() {
      const sel = state.runs.filter((r) => state.selectedRunIds.has(r.id));
      return sel.length ? sel : state.runs;
    }

    function renderRunChips() {
      const runs = state.runs;
      el.runChips.innerHTML = '';
      runs.forEach((r) => {
        if (state.selectedRunIds.size === 0) state.selectedRunIds.add(r.id);
        const chip = document.createElement('label');
        chip.className = 'chip';
        chip.innerHTML = `<input type="checkbox" ${state.selectedRunIds.has(r.id) ? 'checked' : ''} data-id="${esc(r.id)}"/> ${esc(r.model)} · ${esc(r.prompt)}`;
        el.runChips.appendChild(chip);
      });
      el.runChips.querySelectorAll('input[type="checkbox"]').forEach((inp) => {
        inp.addEventListener('change', () => {
          const id = inp.getAttribute('data-id');
          if (inp.checked) state.selectedRunIds.add(id); else state.selectedRunIds.delete(id);
          applyFilters();
        });
      });
    }

    function renderSummaryTable() {
      const runs = selectedRuns();
      if (!runs.length) {
        el.summaryWrap.innerHTML = '<div class="note" style="padding:.6rem;">No runs selected.</div>';
        return;
      }
      const summaryMetrics = [
        'exec_exact_match_rate',
        'avg_f1',
        'avg_sql_ast_similarity',
        'avg_row_jaccard',
        'avg_pred_confidence',
      ];

      const rows = runs.map((r) => {
        const cells = summaryMetrics.map((m) => {
          const v = r.summary[m];
          const band = bandFor(v, m);
          return `<td><span class="metric-cell ${band}">${esc(metricText(v, m))}</span></td>`;
        }).join('');
        return `<tr>
          <td>${esc(r.model)}</td>
          <td>${esc(r.prompt)}</td>
          <td>${esc(r.summary.evaluated_items ?? 'NA')}</td>
          <td>${esc(r.summary.exec_exact_match ?? 'NA')}</td>
          ${cells}
        </tr>`;
      }).join('');

      el.summaryWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Model</th>
              <th>Prompt</th>
              <th>Items</th>
              <th>Exact Match Count</th>
              <th>Exact Match Rate</th>
              <th>Avg F1</th>
              <th>Avg AST</th>
              <th>Avg Jaccard</th>
              <th>Avg Conf</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function itemPassesFilters(item, runs) {
      const search = el.search.value.trim().toLowerCase();
      const status = el.status.value;
      const metricName = el.metric.value;
      const colorFilter = el.colorFilter.value;

      if (search) {
        const hay = `${item.item_id} ${item.question}`.toLowerCase();
        if (!hay.includes(search)) return false;
      }

      const rows = runs.map((r) => item.byRun.get(r.id)).filter(Boolean);
      if (!rows.length) return false;

      if (status === 'error' && !rows.some((x) => !!x.error)) return false;
      if (status === 'exact' && !rows.some((x) => !!x.exact_exec_match)) return false;
      if (status === 'exec_ok' && !rows.every((x) => !!x.pred_exec_ok && !!x.gt_exec_ok)) return false;

      if (colorFilter !== 'all') {
        const hasColor = rows.some((x) => bandFor(x[metricName], metricName) === colorFilter);
        if (!hasColor) return false;
      }

      return true;
    }

    function renderItemsTable() {
      const runs = selectedRuns();
      if (!runs.length) {
        el.itemsWrap.innerHTML = '<div class="note" style="padding:.6rem;">No runs selected.</div>';
        return;
      }

      const metricName = el.metric.value;
      state.filteredItems = state.items.filter((it) => itemPassesFilters(it, runs));

      el.counts.textContent = `${state.filteredItems.length} / ${state.items.length} items · ${runs.length} run(s) selected`;

      const headerRunCols = runs.map((r) => `<th>${esc(r.model)}<br/><span style="font-size:.72rem;color:#4f6f52">${esc(r.prompt)}</span></th>`).join('');

      const body = state.filteredItems.map((it) => {
        const rowCols = runs.map((r) => {
          const d = it.byRun.get(r.id);
          const v = d ? d[metricName] : null;
          const b = bandFor(v, metricName);
          return `<td>${d ? `<span class="metric-cell ${b}">${esc(metricText(v, metricName))}</span>` : '<span class="metric-cell na">NA</span>'}</td>`;
        }).join('');

        const active = state.activeItemId === it.item_id ? ' class="active"' : '';
        return `<tr data-item="${esc(it.item_id)}"${active}>
          <td>${esc(it.item_id)}</td>
          <td title="${esc(it.question)}">${esc((it.question || '').slice(0, 110))}${(it.question || '').length > 110 ? '...' : ''}</td>
          ${rowCols}
        </tr>`;
      }).join('');

      el.itemsWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width:110px;">Item</th>
              <th>Question</th>
              ${headerRunCols}
            </tr>
          </thead>
          <tbody>${body || '<tr><td colspan="99" class="note">No rows match filters.</td></tr>'}</tbody>
        </table>
      `;

      el.itemsWrap.querySelectorAll('tbody tr[data-item]').forEach((tr) => {
        tr.addEventListener('click', () => {
          state.activeItemId = tr.getAttribute('data-item');
          renderItemsTable();
          renderDetail();
        });
      });
    }

    function renderDetail() {
      const runs = selectedRuns();
      if (!state.activeItemId) {
        el.detail.textContent = 'Click a row to inspect SQL and metrics per run.';
        return;
      }
      const item = state.items.find((x) => x.item_id === state.activeItemId);
      if (!item) {
        el.detail.textContent = 'No item selected.';
        return;
      }

      const cards = runs.map((r) => {
        const d = item.byRun.get(r.id);
        if (!d) {
          return `<div class="card"><h4>${esc(r.model)} · ${esc(r.prompt)}</h4><div class="note">No row</div></div>`;
        }
        return `
          <div class="card">
            <h4>${esc(r.model)} · ${esc(r.prompt)}</h4>
            <div class="kvs">
              error: ${esc(d.error || 'none')}<br/>
              exec_ok: ${esc(!!d.pred_exec_ok && !!d.gt_exec_ok)} · exact: ${esc(!!d.exact_exec_match)}<br/>
              f1: ${esc(metricText(d.f1, 'f1'))} · ast: ${esc(metricText(d.sql_ast_similarity, 'sql_ast_similarity'))} · conf: ${esc(metricText(d.pred_confidence, 'pred_confidence'))}
            </div>
            <pre>${esc(d.pred_sql || '')}</pre>
          </div>
        `;
      }).join('');

      const gt = runs.map((r) => item.byRun.get(r.id)).find(Boolean);
      const gtSql = gt ? gt.gt_sql : '';

      el.detail.innerHTML = `
        <div style="font-weight:700; margin-bottom:.3rem;">${esc(item.item_id)}</div>
        <div class="note" style="margin-bottom:.45rem;">${esc(item.question || '')}</div>
        <div class="card" style="margin-bottom:.6rem;">
          <h4>GT SQL</h4>
          <pre>${esc(gtSql || '')}</pre>
        </div>
        <div class="grid">${cards}</div>
      `;
    }

    function applyFilters() {
      renderSummaryTable();
      renderItemsTable();
      renderDetail();
    }

    async function loadAll() {
      const paths = el.paths.value.split('\n').map((x) => x.trim()).filter(Boolean);
      if (!paths.length) {
        alert('Add at least one JSON path');
        return;
      }

      try {
        const runs = [];
        for (const p of paths) runs.push(await loadRun(p));
        state.runs = runs;
        state.selectedRunIds = new Set(runs.map((r) => r.id));
        state.activeItemId = null;
        buildItemUnion();
        renderRunChips();
        applyFilters();
      } catch (e) {
        el.counts.textContent = `Load failed: ${e.message}`;
      }
    }

    el.load.addEventListener('click', loadAll);
    el.clear.addEventListener('click', () => {
      state.selectedRunIds.clear();
      applyFilters();
    });
    ['input', 'change'].forEach((ev) => {
      el.search.addEventListener(ev, applyFilters);
      el.status.addEventListener(ev, applyFilters);
      el.metric.addEventListener(ev, applyFilters);
      el.colorFilter.addEventListener(ev, applyFilters);
    });

    loadAll();
  </script>
</body>
</html>
